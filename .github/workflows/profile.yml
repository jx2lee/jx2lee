name: Generate Snake and Metrics
on:
  schedule:
    - cron: "0 15 * * *"
  push: {branches: ["master"]}
  workflow_dispatch:

jobs:
  build-snake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      
      - uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - run: git status
      
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: master
          force: true
      
      - name: github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.GITHUB_TOKEN }}
          user: jx2lee
          template: terminal
          base: header, activity, community, repositories
          config_animations: yes
          config_timezone: Asia/Seoul
          plugin_isocalendar: no
          plugin_isocalendar_duration: full-year
          plugin_languages: yes
          plugin_languages_ignored: html, javascript, css, xslt, mustache, vim script, stylus, ejs, nunjucks, jupyter notebook, scss, jinja
          plugin_lines: yes

      - uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.recent.activity.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 0
          plugin_activity_filter: issue, pr, review, comment, star
